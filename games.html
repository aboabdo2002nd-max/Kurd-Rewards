<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الألعاب - كردو عفرين</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2e7d32;
color:#fff;
padding:18px;
font-size:30px;
font-weight:bold;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.container{
padding:20px;
}

.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}
.game{
background:#fff;
border-radius:18px;
padding:15px;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.12);
transition:.3s;
}

.game:hover{
transform:translateY(-5px);
}

.game img{
width:100%;
height:130px;
object-fit:cover;
border-radius:12px;
}

.game h3{
margin:12px 0 8px;
color:#2e7d32;
font-size:20px;
}

.points{
color:#ff9800;
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}

.play-btn{
display:inline-block;
width:100%;
padding:12px;
background:#2e7d32;
color:#fff;
text-decoration:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
🎮 الألعاب
</header>

<div class="container">

<div class="games">

<div class="game">
<img src="https://picsum.photos/300/200?random=1">
<h3>سباق السيارات</h3>
<div class="points">⭐ +150 نقطة</div>
<a href="#" class="play-btn">ابدأ اللعب</a>
</div>

<div class="game">
<img src="https://picsum.photos/300/200?random=2">
<h3>لعبة الألغاز</h3>
<div class="points">⭐ +200 نقطة</div>
<a href="#" class="play-btn">ابدأ اللعب</a>
</div>

<div class="game">
<img src="https://picsum.photos/300/200?random=3">
<h3>كرة القدم</h3>
<div class="points">⭐ +180 نقطة</div>
<a href="#" class="play-btn">ابدأ اللعب</a>
</div>

<div class="game">
<img src="https://picsum.photos/300/200?random=4">
<h3>لعبة الذاكرة</h3>
<div class="points">⭐ +120 نقطة</div>
<a href="#" class="play-btn">ابدأ اللعب</a>
</div>

</div>

</div>

</body>
</html>
