<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الألعاب</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
font-size:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.game{
background:white;
border-radius:15px;
padding:25px;
text-align:center;
font-size:22px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

a{
text-decoration:none;
color:black;
}
</style>

</head>

<body>

<header>
🎮 الألعاب
</header>

<div class="grid">

<a href="#">
<div class="game">
🧩<br>
لعبة الألغاز
</div>
</a>

<a href="#">
<div class="game">
🏎️<br>
سباق السيارات
</div>
</a>

<a href="#">
<div class="game">
🎯<br>
التصويب
</div>
</a>

<a href="#">
<div class="game">
🧠<br>
اختبار الذكاء
</div>
</a>

</div>

</body>
</html>
