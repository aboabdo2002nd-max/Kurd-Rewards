<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>كردو عفرين</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:url("afrin.jpg") center center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:380px;
text-align:center;
color:white;
}

h1{
font-size:46px;
margin-bottom:10px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.8;
margin-bottom:40px;
}

.btn{
display:block;
width:100%;
padding:18px;
margin:15px 0;
border:none;
border-radius:18px;
font-size:24px;
cursor:pointer;
text-decoration:none;
}

.login{
background:#2e7d32;
color:white;
}

.register{
background:white;
color:#2e7d32;
font-weight:bold;
}

.skip{
display:block;
margin-top:30px;
color:white;
font-size:22px;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1>👋</h1>

<h2>مرحباً بكم<br>في موقع كردو عفرين</h2>

<p>
اربح من الألعاب، اجمع النقاط،
واستبدلها بجوائز حقيقية.
</p>

<a href="login.html" class="btn login">
تسجيل الدخول
</a>

<a href="register.html" class="btn register">
إنشاء حساب جديد
</a>

<a href="#" class="skip">
تخطي الآن
</a>

</div>

</body>
</html>
