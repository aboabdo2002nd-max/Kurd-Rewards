<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كردو عفرين</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:400px;
text-align:center;
color:white;
}

.wave{
font-size:60px;
margin-bottom:15px;
}

h1{
font-size:48px;
margin-bottom:10px;
text-shadow:2px 2px 8px black;
}

h2{
font-size:32px;
margin-bottom:30px;
color:#FFD54F;
text-shadow:2px 2px 8px black;
}

p{
font-size:24px;
line-height:1.7;
margin-bottom:45px;
text-shadow:2px 2px 8px black;
}

.btn{
display:block;
width:100%;
padding:18px;
margin:18px 0;
border-radius:18px;
text-decoration:none;
font-size:28px;
font-weight:bold;
transition:.3s;
}

.login{
background:#2E7D32;
color:white;
}

.register{
background:white;
color:#2E7D32;
}

.skip{
display:inline-block;
margin-top:25px;
font-size:28px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="wave">👋</div>

<h1>مرحباً بكم</h1>

<h2>في موقع كردو عفرين</h2>

<p>
اربح من الألعاب، اجمع النقاط،
واستبدلها بجوائز حقيقية.
</p>

<a class="btn login" href="login.html">
تسجيل الدخول
</a>

<a class="btn register" href="register.html">
إنشاء حساب جديد
</a>

<a class="skip" href="#">
تخطي الآن
</a>

</div>

</body>
</html>
