<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كردو عفرين</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background-image:
    linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
    color:#fff;
}

.logo{
    font-size:65px;
    margin-bottom:15px;
}

h1{
    font-size:42px;
    margin-bottom:10px;
    text-shadow:2px 2px 10px black;
}

p{
    font-size:22px;
    line-height:1.8;
    margin:25px 0 40px;
    text-shadow:2px 2px 8px black;
}

.btn{
    display:block;
    width:100%;
    padding:18px;
    margin:18px 0;
    border:none;
    border-radius:20px;
    font-size:28px;
    text-decoration:none;
    font-weight:bold;
}

.login{
    background:#2e7d32;
    color:white;
}

.register{
    background:white;
    color:#2e7d32;
}

.skip{
    display:block;
    margin-top:30px;
    color:white;
    font-size:28px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">👋</div>

<h1>مرحباً بكم<br>في موقع كردو عفرين</h1>

<p>
اربح من الألعاب، اجمع النقاط،
واستبدلها بجوائز حقيقية.
</p>

<a href="login.html" class="btn login">تسجيل الدخول</a>

<a href="register.html" class="btn register">إنشاء حساب جديد</a>

<a href="home.html" class="skip">تخطي الآن</a>

</div>

</body>
</html>
