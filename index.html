<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كردو عفرين</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    header{
      background:#176b2d;
      color:white;
      padding:25px 20px 40px;
      border-radius:0 0 30px 30px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:28px;
    }

    .logo{
      text-align:center;
      margin-top:10px;
      font-size:30px;
      font-weight:bold;
    }

    .welcome{
      text-align:center;
      margin-top:8px;
      opacity:.9;
      font-size:16px;
    }
  </style>
</head>

<body>

<header>
  <div class="top">
    <span>☰</span>
    <span>🔔</span>
  </div>

  <div class="logo">كردو عفرين</div>

  <p class="welcome">
    اكسب نقاطًا واستبدلها بمكافآت حقيقية
  </p>
</header>

</body>
</html>
