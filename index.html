<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>كردو عفرين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80') center center/cover no-repeat;
    height:100vh;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

.container{
    width:100%;
    max-width:450px;
    text-align:center;
    color:#fff;
}

.hand{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    font-size:40px;
    font-weight:800;
    margin-bottom:20px;
    text-shadow:2px 2px 8px rgba(0,0,0,.6);
}

.desc{
    font-size:22px;
    line-height:1.8;
    margin-bottom:40px;
    text-shadow:2px 2px 8px rgba(0,0,0,.6);
}

.btn{
    display:block;
    width:100%;
    padding:18px;
    border-radius:15px;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    margin-bottom:18px;
    transition:.3s;
}

.login{
    background:#1f7a34;
    color:white;
}

.signup{
    background:white;
    color:#1f7a34;
}

.skip{
    display:inline-block;
    margin-top:15px;
    color:white;
    text-decoration:none;
    font-size:20px;
}
</style>

</head>
<body>

<div class="overlay">
<div class="container">

<div class="hand">👋</div>

<h1>مرحبًا بكم في موقع كردو عفرين</h1>

<p class="desc">
استمتع بالألعاب، واجمع النقاط، واربح باستمرار.
</p>

<a href="login.html" class="btn login">
تسجيل الدخول
</a>

<a href="signup.html" class="btn signup">
إنشاء حساب جديد
</a>

<a href="home.html" class="skip">
تخطي الآن
</a>

</div>
</div>

</body>
</html>
