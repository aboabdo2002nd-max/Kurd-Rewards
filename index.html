<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كردو عفرين</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:url("afrin.png") no-repeat center center;
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:400px;
text-align:center;
color:#fff;
}

h1{
font-size:46px;
margin-bottom:15px;
text-shadow:2px 2px 8px #000;
}

.line{
font-size:34px;
margin-bottom:25px;
color:#ffd54f;
}

p{
font-size:22px;
line-height:1.8;
margin-bottom:45px;
text-shadow:1px 1px 5px #000;
}

.btn{
display:block;
width:100%;
padding:18px;
margin:18px 0;
border-radius:18px;
text-decoration:none;
font-size:24px;
font-weight:bold;
transition:.3s;
}

.login{
background:#2e7d32;
color:#fff;
}

.register{
background:#fff;
color:#2e7d32;
}

.skip{
display:inline-block;
margin-top:20px;
font-size:22px;
color:#fff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>👋</h1>

<div class="line">
مرحباً بكم<br>
في موقع كردو عفرين
</div>

<p>
اربح من الألعاب، اجمع النقاط،
واستبدلها بجوائز حقيقية.
</p>

<a href="login.html" class="btn login">
تسجيل الدخول
</a>

<a href="register.html" class="btn register">
إنشاء حساب جديد
</a>

<a href="#" class="skip">
تخطي الآن
</a>

</div>

</body>
</html>
