<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كردو عفرين</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:420px;
text-align:center;
color:#fff;
}

.logo{
font-size:70px;
margin-bottom:15px;
}

h1{
font-size:44px;
margin-bottom:15px;
text-shadow:2px 2px 8px #000;
}

p{
font-size:23px;
line-height:1.8;
margin-bottom:40px;
text-shadow:2px 2px 8px #000;
}

.btn{
display:block;
width:100%;
padding:18px;
margin:18px 0;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-decoration:none;
}

.login{
background:#2e7d32;
color:white;
}

.register{
background:white;
color:#2e7d32;
}

.skip{
display:block;
margin-top:25px;
color:white;
font-size:26px;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">👋</div>

<h1>مرحباً بكم<br>في موقع كردو عفرين</h1>

<p>
اربح من الألعاب، اجمع النقاط، واستبدلها بجوائز حقيقية.
</p>

<a href="home.html" class="btn login">تسجيل الدخول</a>

<a href="register.html" class="btn register">إنشاء حساب جديد</a>

<a href="home.html" class="skip">تخطي الآن</a>

</div>

</body>
</html>
