<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کردو عفرین</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:90%;
max-width:420px;
text-align:center;
}

h1{
font-size:48px;
margin-bottom:10px;
}

h2{
font-size:26px;
margin-bottom:20px;
font-weight:normal;
}

p{
font-size:20px;
line-height:1.8;
margin-bottom:40px;
}

.btn{
display:block;
width:100%;
padding:18px;
margin:18px 0;
border-radius:18px;
text-decoration:none;
font-size:24px;
font-weight:bold;
transition:.3s;
}

.login{
background:#2e7d32;
color:white;
}

.register{
background:white;
color:#2e7d32;
}

.skip{
display:inline-block;
margin-top:25px;
color:white;
font-size:22px;
text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h1>👋</h1>

<h2>مرحباً بكم<br>في موقع کردو عفرین</h2>

<p>
اربح من الألعاب، اجمع النقاط،
واستبدلها بجوائز حقيقية.
</p>

<a href="login.html" class="btn login">
تسجيل الدخول
</a>

<a href="register.html" class="btn register">
إنشاء حساب جديد
</a>

<a href="#" class="skip">
تخطي الآن
</a>

</div>

</body>
</html>
