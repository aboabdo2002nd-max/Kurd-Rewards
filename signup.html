<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:420px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.12);
}

h1{
text-align:center;
color:#176b2d;
margin-bottom:25px;
font-size:40px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#176b2d;
color:white;
border:none;
border-radius:10px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.link{
text-align:center;
margin-top:20px;
font-size:18px;
}

.link a{
color:#176b2d;
font-weight:bold;
text-decoration:none;
}
</style>

</head>
<body>

<div class="box">

<h1>إنشاء حساب</h1>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">

<button id="signupBtn">إنشاء حساب</button>

<div class="link">
لديك حساب؟
<a href="login.html">تسجيل الدخول</a>
</div>

</div>
<script type="module" src="signup.js"></script>
</body>
</html>
