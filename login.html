<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:25px;
color:#176b2d;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#176b2d;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.link{
text-align:center;
margin-top:20px;
}

a{
color:#176b2d;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h1>تسجيل الدخول</h1>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني">

<input
type="password"
id="password"
placeholder="كلمة المرور">

<button id="loginBtn">
تسجيل الدخول
</button>

<div class="link">
ليس لديك حساب؟
<a href="signup.html">إنشاء حساب</a>
</div>

</div>

</body>
</html>
