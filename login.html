<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:320px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#2e7d32;
}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل الدخول</h2>

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

<a href="register.html">إنشاء حساب جديد</a>

</div>

</body>
</html>
