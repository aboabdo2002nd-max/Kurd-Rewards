<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكافآت الكرد</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:#2e7d32;
color:white;
padding:30px 20px;
text-align:center;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.balance{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.balance h2{
color:#2e7d32;
font-size:35px;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
padding:25px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.15);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
font-size:24px;
}

.news{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
margin-bottom:90px;
}
</style>

</head>

<body>

<div class="header">
<h1>🏆 مكافآت الكرد</h1>
<p>اربح النقاط واستبدلها بأموال حقيقية</p>
</div>

<div class="balance">
<h3>رصيدك الحالي</h3>
<h2>0 نقطة</h2>
</div>

<div class="grid">

<a href="games.html">
    <div class="card">🎮<br>الألعاب</div>
</a>

<div class="card">🎁<br>المهام</div>

<div class="card">👥<br>دعوة الأصدقاء</div>

<div class="card">💸<br>سحب الأرباح</div>

</div>

<div class="news">
<h3>📢 آخر الأخبار</h3>
<p>🎁 ادعُ أول صديق واحصل على 100 نقطة مجانية.</p>
</div>

<div class="bottom">
<span>🏠</span>
<span>🎮</span>
<span>💰</span>
<span>👤</span>
</div>

</body>
</html>
