<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2e7d32;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
color:#2e7d32;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>إنشاء حساب جديد</h2>

<input id="name" type="text" placeholder="الاسم الكامل">

<input id="email" type="email" placeholder="البريد الإلكتروني">

<input id="password" type="password" placeholder="كلمة المرور">

<input id="confirmPassword" type="password" placeholder="تأكيد كلمة المرور">

<button id="signupBtn">إنشاء حساب</button>

<a href="login.html">لديك حساب؟ تسجيل الدخول</a>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
