<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | Kurd Rewards</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#2e7d32;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#2e7d32;
}
</style>
</head>

<body>

<div class="container">

<h2>إنشاء حساب</h2>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<input type="password" id="confirm" placeholder="تأكيد كلمة المرور">

<button onclick="register()">إنشاء الحساب</button>

<a href="login.html">لديك حساب؟ تسجيل الدخول</a>

</div>

<script>
function register(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

if(name==="" || email==="" || password===""){
alert("يرجى ملء جميع الحقول");
return;
}

if(password!==confirm){
alert("كلمتا المرور غير متطابقتين");
return;
}

localStorage.setItem("name",name);
localStorage.setItem("email",email);
localStorage.setItem("password",password);

alert("تم إنشاء الحساب بنجاح");

window.location.href="login.html";

}
</script>

</body>
</html>
