<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | Kurd Rewards</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:400px;
    margin:50px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2d7d46;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2d7d46;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#2d7d46;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1>إنشاء حساب</h1>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<input type="password" id="confirm" placeholder="تأكيد كلمة المرور">

<button onclick="register()">إنشاء الحساب</button>

<a href="login.html">لديك حساب؟ تسجيل الدخول</a>

</div>

<script>
function register(){

let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

if(password!==confirm){
alert("كلمتا المرور غير متطابقتين");
return;
}

alert("تم إنشاء الحساب بنجاح");

window.location.href="login.html";

}
</script>

</body>
</html>
