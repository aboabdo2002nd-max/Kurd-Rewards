
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>كردو عفرين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#176b2d;
color:white;
padding:20px;
border-radius:0 0 30px 30px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
font-size:28px;
}

.title{
text-align:center;
margin-top:10px;
font-size:30px;
font-weight:bold;
}

.subtitle{
text-align:center;
font-size:18px;
opacity:.8;
}

.container{
padding:18px;
}

.card{
background:white;
border-radius:25px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-top:-35px;
position:relative;
}

.profile{
display:flex;
justify-content:space-between;
align-items:center;
}

.avatar{
width:70px;
height:70px;
background:#176b2d;
border-radius:50%;
}

.points{
font-size:45px;
font-weight:bold;
margin-top:15px;
}

.coin{
color:#f7b500;
font-size:35px;
}
