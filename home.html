<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرئيسية</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1f6b2f;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.profile{
display:flex;
justify-content:space-between;
align-items:center;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

.name{
font-size:32px;
font-weight:bold;
color:#1f6b2f;
}

.points{
margin-top:20px;
font-size:26px;
}

.points span{
color:#f0b400;
font-size:40px;
font-weight:bold;
}

.banner{
margin:15px;
background:#1f6b2f;
color:white;
padding:20px;
border-radius:20px;
text-align:center;
}

.banner h2{
font-size:30px;
}

.banner p{
margin-top:10px;
font-size:20px;
}

.banner button{
margin-top:15px;
padding:15px 35px;
border:none;
border-radius:12px;
background:white;
color:#1f6b2f;
font-size:22px;
font-weight:bold;
}

.games{
padding:15px;
}

.games h2{
margin-bottom:20px;
color:#1f6b2f;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.game{
background:white;
border-radius:15px;
padding:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.game img{
width:100%;
border-radius:12px;
}

.game h3{
margin:10px 0;
font-size:18px;
}

.reward{
background:#1f6b2f;
color:white;
padding:8px;
border-radius:20px;
font-size:18px;
}
</style>

</head>

<body>

<header>
الرئيسية
</header>

<div class="card">

<div class="profile">

<div>
<div class="name">مرحباً بك</div>
<h2>أحمد</h2>
</div>

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

</div>

<div class="points">
رصيد النقاط<br><br>
⭐ <span>2,560</span>
</div>

</div>

<div class="banner">

<h2>استبدل نقاطك</h2>

<p>واحصل على مكافآت رائعة</p>

<button>استبدل الآن</button>

</div>

<div class="games">

<h2>الألعاب المميزة</h2>

<div class="grid">

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/7/7f/Subway_Surfers_app_logo.png">
<h3>Subway</h3>
<div class="reward">+150 ⭐</div>
</div>

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5a/Candy_Crush_Saga_Logo.png">
<h3>Candy Crush</h3>
<div class="reward">+200 ⭐</div>
</div>

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/9/95/8_Ball_Pool_icon.png">
<h3>8 Ball Pool</h3>
<div class="reward">+180 ⭐</div>
</div>

</div>

</div>

</body>
</html>
