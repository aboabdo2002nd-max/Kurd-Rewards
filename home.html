<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كردو عفرين - الرئيسية</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f3f5f7;
}

header{
background:#1f7a3d;
color:#fff;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.icon{
font-size:28px;
cursor:pointer;
}

.container{
padding:15px;
}

.welcome{
background:linear-gradient(135deg,#2e7d32,#43a047);
color:#fff;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
}

.welcome h2{
font-size:28px;
margin-bottom:8px;
}

.points{
background:#fff;
border-radius:18px;
padding:18px;
text-align:center;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.points h3{
color:#666;
font-size:20px;
}

.points span{
display:block;
margin-top:10px;
font-size:38px;
font-weight:bold;
color:#ff9800;
}

.reward{
background:linear-gradient(135deg,#ffb300,#ff8f00);
color:#fff;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.reward h2{
margin-bottom:10px;
}

.reward button{
margin-top:15px;
padding:14px 28px;
border:none;
border-radius:12px;
background:#fff;
color:#ff8f00;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.section-title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
color:#2e7d32;
}

.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}
  .game{
background:#fff;
border-radius:18px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.12);
transition:.3s;
}

.game:hover{
transform:translateY(-5px);
}

.game .emoji{
font-size:55px;
margin-bottom:10px;
}

.game h3{
font-size:20px;
margin-bottom:10px;
color:#333;
}

.game p{
color:#666;
margin-bottom:15px;
}

.play-btn{
display:inline-block;
background:#2e7d32;
color:#fff;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}

.bottom-nav a{
text-decoration:none;
color:#555;
font-size:15px;
text-align:center;
}

.bottom-nav a.active{
color:#2e7d32;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<div class="icon">☰</div>
الرئيسية
<div class="icon">🔔</div>
</header>

<div class="container">

<div class="welcome">
<div>
<h2>مرحباً بك</h2>
<p>في موقع كردو عفرين</p>
</div>
<div class="avatar">👤</div>
</div>

<div class="points">
<h3>رصيد النقاط</h3>
<span>2,560 ⭐</span>
</div>

<div class="reward">
<h2>🎁 استبدل نقاطك</h2>
<p>استبدل نقاطك بجوائز حقيقية.</p>
<button>استبدل الآن</button>
</div>

<h2 class="section-title">🎮 الألعاب</h2>

<div class="games">

<div class="game">
<div class="emoji">🚗</div>
<h3>سباق السيارات</h3>
<p>+150 نقطة</p>
<h2>🎮 الألعاب</h2>

<div class="games">

  <div class="game">
    <div class="icon">🚇</div>
    <h3>Subway Surfers</h3>
    <p>+150 نقطة</p>
    <a href="games/subway.html" class="play-btn">العب</a>
  </div>

  <div class="game">
    <div class="icon">🧩</div>
    <h3>لعبة الألغاز</h3>
    <p>+120 نقطة</p>
    <a href="games/puzzle.html" class="play-btn">العب</a>
  </div>

  <div class="game">
    <div class="icon">⚽</div>
    <h3>كرة القدم</h3>
    <p>+200 نقطة</p>
    <a href="games/football.html" class="play-btn">العب</a>
  </div>

  <div class="game">
    <div class="icon">🎯</div>
    <h3>التحدي</h3>
    <p>+180 نقطة</p>
    <a href="games/challenge.html" class="play-btn">العب</a>
  </div>

</div></body>
</html>
